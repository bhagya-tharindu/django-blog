<!doctype html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}">
    <style>
      input {
        width: 100%;
        border: 1px solid black;
        padding: 8px 12px;
        border-radius: 8px;
        outline: none;
      }

      input:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.3);
      }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-lg">
    <h1 class="text-3xl font-bold text-center mb-6">Create Account</h1>

    {% if form.errors %}
        <div class="mb-4 text-red-600">
            {{ form.errors }}
        </div>
    {% endif %}

    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}

        <button
            type="submit"
            class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg"
        >
            Sign Up
        </button>
    </form>

    <p class="text-center mt-4">
        Already have an account?
        <a href="/accounts/login/" class="text-blue-600 hover:underline">
            Login
        </a>
    </p>
</div>

</body>
</html>
