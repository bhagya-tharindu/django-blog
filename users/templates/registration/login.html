<!doctype html>
<html lang="en">
  <head>
    {% load static %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}" />
    <title>Login</title>
    <style>
      input {
        width: 100%;
        border: 1px solid black;
        padding: 8px 12px;
        border-radius: 8px;
        outline: none;
      }

      input:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.3);
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md">
      <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800">Welcome Back</h1>
        <p class="text-gray-500 mt-2">Login to your blog account</p>
      </div>

      <form method="post" class="space-y-5">
        {% csrf_token %}

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Username
          </label>
          {{ form.username }}
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Password
          </label>
          {{ form.password }}
        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition duration-300"
        >
          Login
        </button>
      </form>

      <div class="text-center mt-6">
        <p class="text-sm text-gray-500">
          Don't have an account?
          <a href="/accounts/register/" class="text-blue-600 font-medium hover:underline">
            Register
          </a>
        </p>
      </div>
    </div>
  </body>
</html>
