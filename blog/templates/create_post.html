<!doctype html>
<html lang="en">
  <head>
    {% load static %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}" />
    <title>Create Blog Post</title>
  </head>
  <body class="bg-gray-100 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white shadow-md">
      <div
        class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center"
      >
        <div>
          <a
            href="/"
            class="text-2xl font-bold text-blue-600 flex items-center gap-2"
          >
            <i class="fa-solid fa-pen-nib"></i>
            My Blog
          </a>
        </div>

        <div class="flex items-center space-x-6">
          <a
            href="/"
            class="text-gray-700 hover:text-blue-600 font-medium flex items-center gap-2"
          >
            <i class="fa-solid fa-house-chimney"></i>
            Home
          </a>

          {% if user.is_authenticated %}

          <a
            href="/create/"
            class="text-gray-700 hover:text-blue-600 font-medium flex items-center gap-2"
          >
            <i class="fa-solid fa-pen-to-square"></i>
            Create Blog
          </a>

          <form method="post" action="/accounts/logout/" class="inline">
            {% csrf_token %}
            <button
              type="submit"
              class="text-gray-700 hover:text-red-600 font-medium flex items-center gap-2"
            >
              <i class="fa-solid fa-right-from-bracket"></i>
              Logout
            </button>
          </form>

          {% else %}

          <a
            href="/accounts/login/"
            class="text-gray-700 hover:text-blue-600 font-medium flex items-center gap-2"
          >
            <i class="fa-solid fa-right-to-bracket"></i>
            Login
          </a>

          <a
            href="/accounts/register/"
            class="text-gray-700 hover:text-blue-600 font-medium flex items-center gap-2"
          >
            <i class="fa-solid fa-user-plus"></i>
            Sign Up
          </a>

          {% endif %}
        </div>
      </div>
    </nav>

    <!-- Create Post Form -->
    <div class="max-w-2xl mx-auto mt-12 px-6">
      <div class="bg-white shadow-xl rounded-2xl p-8">
        <div class="mb-6">
          <h1 class="text-3xl font-bold text-gray-800">Create New Blog Post</h1>
          <p class="text-gray-500 mt-2">Share your thoughts with the world</p>
        </div>

        <form method="POST" class="space-y-6">
          {% csrf_token %}

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Title
            </label>
            {{ form.title }}
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Content
            </label>
            {{ form.content }}
          </div>

          <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition duration-300"
          >
            Publish Post
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
