<!doctype html>
<html lang="en">
  <head>
    {% load static %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}" />
    <title>Home - Blog App</title>
  </head>
  <body class="bg-gray-100 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white shadow-md">
      <div
        class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center"
      >
        <div>
          <a href="/" class="text-2xl font-bold text-blue-600"> My Blog </a>
        </div>

        <div class="space-x-6">
          <a href="/" class="text-gray-700 hover:text-blue-600 font-medium">
            Home
          </a>

          <a
            href="/create/"
            class="text-gray-700 hover:text-blue-600 font-medium"
          >
            Create Blog
          </a>

          <form method="post" action="/accounts/logout/" class="inline">
            {% csrf_token %}
            <button
              type="submit"
              class="text-gray-700 hover:text-red-600 font-medium"
            >
              Logout
            </button>
          </form>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-5xl mx-auto mt-10 px-6">
      <div class="mb-8">
        <h1 class="text-4xl font-bold text-gray-800">Latest Blog Posts</h1>
        <p class="text-gray-500 mt-2">Showing the latest 3 posts</p>
      </div>

      <div class="space-y-6">
        {% for post in posts %}
        <div class="bg-white rounded-xl shadow-md p-6">
          <h2 class="text-2xl font-semibold text-gray-800">{{ post.title }}</h2>

          <p class="text-gray-600 mt-3">{{ post.content }}</p>

          <div class="mt-4 text-sm text-gray-400">
            By {{ post.author }} • {{ post.created_at }}
          </div>
        </div>
        {% empty %}
        <div
          class="bg-white rounded-xl shadow-md p-6 text-center text-gray-500"
        >
          No blog posts yet.
        </div>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
